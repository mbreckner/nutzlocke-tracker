name = "nutzlocke-tracker"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# KV namespace for Pokémon statuses and game runs.
#
# Local dev (astro dev / wrangler pages dev):
#   miniflare creates an in-memory/on-disk KV automatically — no real ID needed.
#
# Production (Cloudflare Pages):
#   1. Create a KV namespace in the Cloudflare dashboard (or via Wrangler):
#        wrangler kv namespace create NUZLOCKE_KV
#   2. Replace the placeholder `id` below with the real namespace ID.
#   3. Go to Pages project → Settings → Functions → KV namespace bindings
#      and add binding  NUZLOCKE_KV → <your namespace>.
[[kv_namespaces]]
binding = "NUZLOCKE_KV"
id = "00000000000000000000000000000000"
