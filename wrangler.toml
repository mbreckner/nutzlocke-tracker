name = "nutzlocke-tracker"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# KV namespace for Pokémon statuses and game runs.
# The binding is configured in the Cloudflare Pages Dashboard:
#   Pages → Settings → Functions → KV namespace bindings → NUZLOCKE_KV
#
# For local preview with `npm run preview` (wrangler pages dev dist):
#   wrangler pages dev dist --kv NUZLOCKE_KV
