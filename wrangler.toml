name = "nutzlocke-tracker"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# KV namespace for Pokémon statuses and game runs.
#
# Production (Cloudflare Pages):
#   The binding is configured in the Cloudflare Dashboard:
#   Pages → Settings → Functions → KV namespace bindings → NUZLOCKE_KV
#   No ID is needed here for production.
#
# Local dev (astro dev):
#   platformProxy + miniflare simulates KV automatically.
#   Optionally replace the id with your real namespace ID for
#   `wrangler pages dev` testing against real KV data.
[[kv_namespaces]]
binding = "NUZLOCKE_KV"
id = "00000000000000000000000000000000"
